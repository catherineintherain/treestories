<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ветвящиеся истории · Приключения. Часть 1</title>
<style>
  :root{
    --night-1:#0E131B; --night-2:#18202C; --night-3:#222C3A;
    --paper:#EFE5CF; --paper-2:#E7DABE; --paper-edge:#D9C9A4;
    --ink:#1E2733; --ink-soft:#56616E;
    --amber:#BE7E2A; --amber-bright:#D9A64A; --amber-glow:rgba(217,166,74,.42);
    --sea:#2E5A60; --wax:#9C3B2C;
    --serif:Georgia,'PT Serif','Times New Roman',serif;
    --mono:'Courier New',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--serif);
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(120% 80% at 50% -10%, #2A3545 0%, var(--night-2) 38%, var(--night-1) 100%);
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(12px,3vw,40px) clamp(10px,3vw,28px) 60px;
    overflow-x:hidden;
  }
  /* rain / storm behind everything */
  .storm{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden}
  .storm::before{
    content:""; position:absolute; inset:-20% -10%;
    background-image:repeating-linear-gradient(105deg,
      rgba(180,200,225,.07) 0px, rgba(180,200,225,.07) 1px,
      transparent 1px, transparent 7px);
    animation:rain 0.9s linear infinite;
  }
  .storm::after{ /* lightning flicker */
    content:""; position:absolute; inset:0;
    background:radial-gradient(80% 50% at 50% 0%, rgba(200,220,255,.10), transparent 60%);
    opacity:0; animation:flash 14s ease-in-out infinite;
  }
  @keyframes rain{from{transform:translateY(-40px)}to{transform:translateY(40px)}}
  @keyframes flash{0%,7%,9%,100%{opacity:0}7.5%{opacity:.9}8.3%{opacity:.25}8.8%{opacity:.7}}

  .stage{position:relative; z-index:2; width:100%; max-width:680px; display:flex; flex-direction:column; align-items:center}

  /* lamp glow above the page */
  .lamp{
    position:relative; width:100%;
    filter:drop-shadow(0 26px 50px rgba(0,0,0,.55));
  }
  .lamp::before{
    content:""; position:absolute; left:50%; top:-46px; transform:translateX(-50%);
    width:78%; height:120px; border-radius:50%;
    background:radial-gradient(50% 60% at 50% 50%, var(--amber-glow), transparent 72%);
    filter:blur(6px); z-index:0; pointer-events:none;
  }

  /* the paper page */
  .page{
    position:relative; z-index:1;
    background:
      radial-gradient(130% 90% at 50% 0%, #F6EED9 0%, var(--paper) 46%, var(--paper-2) 100%);
    border:1px solid var(--paper-edge);
    border-radius:6px;
    padding:clamp(22px,5vw,46px) clamp(20px,5vw,52px) clamp(26px,5vw,46px);
    box-shadow:inset 0 1px 0 #FFF8E8, inset 0 0 60px rgba(150,120,70,.10);
  }
  .page::after{ /* paper grain */
    content:""; position:absolute; inset:0; border-radius:6px; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(120,95,55,.06) 1px, transparent 1px);
    background-size:4px 4px; mix-blend-mode:multiply;
  }

  /* top bar */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px}
  .stamp{
    font-family:var(--mono); font-weight:700; letter-spacing:.18em;
    color:var(--paper); background:var(--ink);
    padding:5px 12px; border-radius:3px; font-size:14px;
    box-shadow:1px 1px 0 rgba(0,0,0,.3); transform:rotate(-1.2deg);
  }
  .stamp.story::before{content:"№ "}
  .controls{display:flex; gap:8px}
  .icbtn{
    appearance:none; border:1px solid var(--paper-edge); background:#F3EAD6;
    color:var(--ink-soft); font-family:var(--mono); font-size:13px;
    padding:6px 10px; border-radius:4px; cursor:pointer; line-height:1;
    transition:background .15s, color .15s, border-color .15s;
  }
  .icbtn:hover{background:#fff; color:var(--ink); border-color:var(--ink-soft)}
  .icbtn:focus-visible{outline:2px solid var(--sea); outline-offset:2px}
  .icbtn[disabled]{opacity:.35; cursor:default}

  /* title / cover */
  .cover{text-align:center}
  .eyebrow{font-family:var(--mono); letter-spacing:.42em; text-transform:uppercase;
    font-size:12px; color:var(--amber); margin:0 0 12px}
  .title{
    font-size:clamp(34px,8vw,60px); line-height:.98; margin:0; font-weight:700;
    letter-spacing:-.01em; color:var(--ink);
    text-shadow:0 1px 0 #FFF7E6;
  }
  .title .br{display:block}
  .subtitle{font-family:var(--mono); letter-spacing:.22em; text-transform:uppercase;
    font-size:13px; color:var(--ink-soft); margin:14px 0 0}
  .author{font-style:italic; color:var(--ink-soft); margin:22px 0 0; font-size:17px}
  .rule{height:1px; background:linear-gradient(90deg,transparent,var(--paper-edge),transparent); margin:26px 0}

  .intro{font-size:clamp(16px,2.4vw,18px); line-height:1.62; color:#2A333E}
  .intro p{margin:0 0 16px}
  .intro .lead::first-letter{
    font-size:3.1em; line-height:.8; float:left; padding:6px 10px 2px 0;
    color:var(--amber); font-weight:700; font-family:var(--serif);
  }

  .rules{margin:6px 0 22px; padding:16px 18px; border:1px dashed var(--paper-edge);
    border-radius:5px; background:rgba(255,250,236,.5)}
  .rules h3{font-family:var(--mono); text-transform:uppercase; letter-spacing:.2em; font-size:12px;
    color:var(--ink-soft); margin:0 0 10px}
  .rules ol{margin:0; padding-left:20px; font-size:15px; line-height:1.6; color:#37414C}
  .rules li{margin:0 0 6px}

  /* hero cards */
  .heroes{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:6px}
  .hero{
    appearance:none; cursor:pointer; text-align:left; font-family:var(--serif);
    background:#F7EFDB; border:1px solid var(--paper-edge); border-radius:6px;
    padding:12px 12px 14px; color:var(--ink);
    display:flex; flex-direction:column; gap:8px;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s;
  }
  .hero:hover,.hero:focus-visible{
    transform:translateY(-4px); border-color:var(--amber);
    box-shadow:0 10px 22px rgba(40,30,10,.22); background:#FFFaEc; outline:none;
  }
  .hero .frame{
    aspect-ratio:1/1; border:2px solid var(--ink); border-radius:4px; overflow:hidden;
    background:#fff; box-shadow:inset 0 0 0 4px #fff, 2px 3px 0 rgba(0,0,0,.18);
  }
  .hero .frame img{width:100%; height:100%; object-fit:cover; object-position:center top;
    filter:saturate(.9) contrast(1.02)}
  .hero .role{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--amber)}
  .hero .name{font-size:19px; font-weight:700; line-height:1}
  .hero .desc{font-size:12.5px; color:var(--ink-soft); line-height:1.4}

  /* portraits inside a story scene */
  .portraits{display:flex; gap:10px; justify-content:center; margin:2px 0 18px; flex-wrap:wrap}
  .portrait{
    width:96px; border:2px solid var(--ink); border-radius:4px; overflow:hidden; background:#fff;
    box-shadow:2px 3px 0 rgba(0,0,0,.18);
  }
  .portrait img{width:100%; display:block; aspect-ratio:1/1; object-fit:cover; object-position:center top}
  .portrait .cap{font-family:var(--mono); font-size:10px; text-align:center; padding:3px 2px;
    letter-spacing:.05em; color:var(--ink-soft); border-top:1px solid var(--paper-edge); background:#F6EED9}
  .meet{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--amber); text-align:center; margin:-8px 0 14px}

  .story-text{font-size:clamp(16px,2.4vw,18px); line-height:1.68; color:#262F39}
  .story-text p{margin:0 0 15px}
  .story-text p:last-child{margin-bottom:0}
  .quote{color:var(--sea); font-style:italic}

  /* choices */
  .choices{margin-top:22px; display:flex; flex-direction:column; gap:12px}
  .choice{
    appearance:none; cursor:pointer; font-family:var(--serif); text-align:left;
    background:#F7EFDB; border:1px solid var(--paper-edge); border-left:4px solid var(--amber);
    border-radius:5px; padding:14px 16px 14px 14px; color:var(--ink); font-size:15.5px; line-height:1.5;
    display:flex; gap:12px; align-items:flex-start;
    transition:background .15s, border-color .15s, transform .12s, box-shadow .15s;
  }
  .choice .arrow{font-family:var(--mono); color:var(--amber); font-weight:700; flex:none; padding-top:1px}
  .choice:hover,.choice:focus-visible{
    background:#FFFaEc; border-left-color:var(--sea); transform:translateX(3px);
    box-shadow:-2px 4px 14px rgba(40,30,10,.14); outline:none;
  }
  .choice:hover .arrow,.choice:focus-visible .arrow{color:var(--sea)}

  /* ending */
  .ending-tag{display:inline-block; font-family:var(--mono); letter-spacing:.2em; text-transform:uppercase;
    font-size:12px; padding:6px 12px; border-radius:3px; margin-bottom:16px}
  .ending-tag.good{background:var(--sea); color:#EAF3F0}
  .ending-tag.rest{background:#3a4756; color:#E7ECF2}
  .tobe{margin-top:18px; text-align:center; font-style:italic; color:var(--amber); font-size:17px}
  .tobe small{display:block; font-style:normal; font-family:var(--mono); font-size:11px;
    letter-spacing:.14em; color:var(--ink-soft); text-transform:uppercase; margin-top:6px}

  .end-actions{display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:26px}
  .btn{
    appearance:none; cursor:pointer; font-family:var(--mono); letter-spacing:.08em;
    text-transform:uppercase; font-size:13px; padding:12px 20px; border-radius:5px; border:1px solid var(--ink);
    background:var(--ink); color:var(--paper); transition:transform .12s, opacity .15s;
  }
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--ink-soft)}
  .btn:hover{transform:translateY(-2px)}
  .btn:focus-visible{outline:2px solid var(--sea); outline-offset:2px}

  /* path travelled */
  .path{margin-top:20px; text-align:center; font-family:var(--mono); font-size:11px;
    color:var(--ink-soft); letter-spacing:.08em}
  .path b{color:var(--ink)}

  .credit{position:relative; z-index:2; margin-top:22px; color:#7E8896; font-size:12px;
    font-family:var(--mono); letter-spacing:.12em; text-align:center}

  .fade{animation:pageIn .5s ease both}
  @keyframes pageIn{from{opacity:0; transform:translateY(10px) rotateX(2deg)}to{opacity:1; transform:none}}

  @media (max-width:520px){
    .heroes{grid-template-columns:1fr; gap:10px}
    .hero{flex-direction:row; align-items:center}
    .hero .frame{width:84px; flex:none}
    .hero .body{display:flex; flex-direction:column; gap:5px}
  }
  @media (prefers-reduced-motion:reduce){
    .storm::before,.storm::after{animation:none}
    .fade{animation:none}
    .choice,.hero,.btn{transition:none}
  }
</style>
</head>

</div>

/* ======================= ЗВУК (Web Audio, без файлов) ======================= */
const Sound = (()=>{
  let ctx=null, master=null, ambGain=null, sfxGain=null, ambNode=null, on=true, started=false;
  const AMB=0.06;
  function init(){
    if(ctx) return;
    const AC = window.AudioContext||window.webkitAudioContext;
    ctx = new AC();
    master = ctx.createGain(); master.gain.value=0.9; master.connect(ctx.destination);
    sfxGain = ctx.createGain(); sfxGain.gain.value=0.9; sfxGain.connect(master);
    ambGain = ctx.createGain(); ambGain.gain.value=0.0; ambGain.connect(master);
  }
  function resume(){ if(ctx&&ctx.state==="suspended") ctx.resume(); }
  function noiseBuffer(sec){
    const len=Math.floor(ctx.sampleRate*sec), buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    return buf;
  }
  function tone(freq,t0,dur,type,peak,end){
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||"sine"; o.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(peak||0.3, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+(dur||0.4));
    o.connect(g); g.connect(sfxGain); o.start(t0); o.stop(t0+(dur||0.4)+0.05);
    if(end) o.frequency.exponentialRampToValueAtTime(end, t0+(dur||0.4));
  }
  function burst(dur,cut,type,peak,sweepTo){
    const src=ctx.createBufferSource(); src.buffer=noiseBuffer(dur);
    const f=ctx.createBiquadFilter(); f.type=type||"bandpass"; f.frequency.value=cut||1800; f.Q.value=0.8;
    const g=ctx.createGain(); const t0=ctx.currentTime;
    g.gain.setValueAtTime(peak||0.25,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    if(sweepTo) f.frequency.exponentialRampToValueAtTime(sweepTo,t0+dur);
    src.connect(f); f.connect(g); g.connect(sfxGain); src.start(t0); src.stop(t0+dur);
  }
  function startAmbient(){
    if(!ctx||ambNode) return;
    ambNode=ctx.createBufferSource(); ambNode.buffer=noiseBuffer(4); ambNode.loop=true;
    const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=220; lp.Q.value=0.3;
    const lp2=ctx.createBiquadFilter(); lp2.type="lowpass"; lp2.frequency.value=600;
    const lfo=ctx.createOscillator(), lfoG=ctx.createGain();
    lfo.frequency.value=0.06; lfoG.gain.value=45; lfo.connect(lfoG); lfoG.connect(lp.frequency);
    ambNode.connect(lp); lp.connect(lp2); lp2.connect(ambGain); ambNode.start(); lfo.start();
    ambGain.gain.linearRampToValueAtTime(on?AMB:0.0, ctx.currentTime+3.5);
  }
  const lib = {
    pageTurn(){ burst(0.20,2400,"bandpass",0.18,800); },
    select(){ const t=ctx.currentTime; [523,659,784].forEach((f,i)=>tone(f,t+i*0.09,0.5,"triangle",0.22)); },
    notify(){ const t=ctx.currentTime; tone(880,t,0.18,"sine",0.2); tone(1175,t+0.14,0.3,"sine",0.2); },
    decode(){ const t=ctx.currentTime; [0,1,2,3].forEach(i=>tone(700+i*90,t+i*0.08,0.1,"square",0.12));
      [523,659,784,1046].forEach((f,i)=>tone(f,t+0.5+i*0.06,0.6,"triangle",0.2)); },
    fire(){ burst(0.12,3000,"highpass",0.3,1200); // match strike
      const t=ctx.currentTime; for(let i=0;i<8;i++){ setTimeout(()=>{ if(on) burst(0.12,800,"bandpass",0.06); }, 200+i*140+Math.random()*80); } },
    splash(){ burst(0.5,1600,"lowpass",0.32,200); tone(420,ctx.currentTime,0.25,"sine",0.18,120); },
    night(){ const t=ctx.currentTime; // crickets-ish
      for(let i=0;i<5;i++){ tone(2400,t+i*0.18,0.05,"square",0.05); tone(2400,t+i*0.18+0.07,0.05,"square",0.05);} },
    phone(){ const t=ctx.currentTime;
      const ring=(tt)=>{ for(let k=0;k<6;k++){ tone(k%2?1300:1000, tt+k*0.05, 0.05,"sine",0.16);} };
      ring(t); ring(t+0.9);
      setTimeout(()=>{ if(on){ tone(260,ctx.currentTime,0.18,"sawtooth",0.22,120); tone(220,ctx.currentTime+0.2,0.18,"sawtooth",0.2,110);} },2000); },
    bark(){ tone(260,ctx.currentTime,0.16,"sawtooth",0.22,120); },
    sneeze(){ const t=ctx.currentTime; burst(0.25,1500,"bandpass",0.12,3500); // inhale up
      setTimeout(()=>{ if(on){ burst(0.18,1200,"bandpass",0.3,300); } },300); }, // achoo
    plane(){ const src=ctx.createBufferSource(); src.buffer=noiseBuffer(2.2);
      const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=300; f.Q.value=1.2;
      const g=ctx.createGain(); const t=ctx.currentTime;
      g.gain.setValueAtTime(0.001,t); g.gain.linearRampToValueAtTime(0.18,t+0.8); g.gain.linearRampToValueAtTime(0.001,t+2.2);
      f.frequency.setValueAtTime(220,t); f.frequency.linearRampToValueAtTime(520,t+1.1); f.frequency.linearRampToValueAtTime(260,t+2.2);
      src.connect(f); f.connect(g); g.connect(sfxGain); src.start(t); src.stop(t+2.2);
      setTimeout(()=>this.good&&this.good(),2300); },
    good(){ const t=ctx.currentTime; [523,659,784,1046,1318].forEach((f,i)=>tone(f,t+i*0.12,0.7,"triangle",0.2));
      tone(2093,t+0.7,0.5,"sine",0.12); },
    lullaby(){ const t=ctx.currentTime; [784,659,587,523,440].forEach((f,i)=>tone(f,t+i*0.4,1.0,"sine",0.18)); },
  };
  return {
    play(name){ if(!ctx||!on) return; resume(); if(lib[name]) try{lib[name]();}catch(e){} },
    pageTurn(){ if(!ctx||!on) return; resume(); lib.pageTurn(); },
    firstGesture(){ init(); resume(); if(!started){ started=true; startAmbient(); } },
    toggle(){ on=!on; if(ctx){ ambGain.gain.linearRampToValueAtTime(on?AMB:0.0, ctx.currentTime+0.4);} return on; },
    isOn(){ return on; },
  };
})();

function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function paras(arr){ return arr.map(p=>`<p>${p}</p>`).join(""); }

function topbar(label, isStory){
  return `<div class="topbar">
    <span class="stamp ${isStory?'story':''}">${label}</span>
    <div class="controls">
      <button class="icbtn" id="backBtn" title="Назад">← назад</button>
      <button class="icbtn" id="soundBtn" title="Звук">${Sound.isOn()?'♪ звук':'✕ тихо'}</button>
      <button class="icbtn" id="homeBtn" title="В начало">⟲ заново</button>
    </div>
  </div>`;
}

function portraitsHTML(list){
  if(!list||!list.length) return "";
  const keys = list.map(k=> k==="self" ? state.hero : k);
  const cards = keys.map(k=>{ const h=HERO[k]; return `
    <figure class="portrait"><img src="${h.img}" alt="${h.name}"><figcaption class="cap">${h.name}</figcaption></figure>`;
  }).join("");
  return `<div class="portraits">${cards}</div>`;
}

      <ol>
        <li>Выбери своего героя — с него начнётся история.</li>
        <li>Прочитай отрывок и выбери один из двух вариантов развития событий.</li>
        <li>Нажми на выбранный вариант — и перейдёшь к следующему повороту сюжета.</li>
        <li>И так до самого конца. Концовок несколько — попробуй найти все!</li>
      </ol>
    </div>
    <p class="subtitle" style="text-align:center;margin-bottom:14px">Выбери своего героя</p>
    <div class="heroes">
      ${heroCard("plutoniy","Любознательный учёный, разгадает любой шифр.")}
      ${heroCard("afanasiy","Бесстрашный капитан, чей дом — бескрайний океан.")}
      ${heroCard("cherrypick","Пёс-программист, для которого нет неразрешимых задач.")}
    </div>`;
  bindCover();
}

function topbarCover(){
  return `<div class="topbar">
    <span class="stamp">начало</span>
    <div class="controls">
      <button class="icbtn" id="soundBtn" title="Звук">${Sound.isOn()?'♪ звук':'✕ тихо'}</button>
    </div>
  </div>`;
}

function heroCard(key,desc){
  const h=HERO[key];
  return `<button class="hero" data-hero="${key}">
    <span class="frame"><img src="${h.img}" alt="${h.name}"></span>
    <span class="body">
      <span class="role">${h.role}</span>
      <span class="name">${h.name}</span>
      <span class="desc">${desc}</span>
    </span>
  </button>`;
}

function bindCover(){
  page.querySelectorAll(".hero").forEach(b=>{
    b.addEventListener("click",()=>{
      Sound.firstGesture(); Sound.play("select");
      const key=b.dataset.hero; state.hero=key; state.history=[];
      const startSec = key==="plutoniy"?2 : key==="afanasiy"?3 : 4;
      go(startSec, false);
    });
  });
  bindSound();
}

function renderStory(id){
  const s = STORY[id];
  page.className="page fade";
  let body = topbar(String(id), true);
  body += portraitsHTML(s.portraits);
  if(s.meet) body += `<div class="meet">✶ ${s.meet} ✶</div>`;
  if(s.ending){
    body += `<span class="ending-tag ${s.ending}">${s.ending==='good'?'Концовка · клад ждёт':'Концовка · до утра'}</span>`;
  }
  body += `<div class="story-text">${paras(s.text)}</div>`;

  if(s.ending){
    body += `<div class="tobe">Продолжение следует…<small>встретимся в новых сериях «Ветвящихся историй»</small></div>`;
    body += `<div class="end-actions">
        <button class="btn" id="againBtn">Читать заново</button>
        <button class="btn ghost" id="backBtn2">← вернуться к выбору</button>
      </div>`;
    body += pathHTML();
  } else {
    const arrows=["▸","▸"];
    body += `<div class="choices">` + s.choices.map((c,i)=>`
        <button class="choice" data-to="${c.to}">
          <span class="arrow">${arrows[i]}</span><span>${c.text}</span>
        </button>`).join("") + `</div>`;
  }
  page.innerHTML = body;
  bindStory(s);
}

function pathHTML(){
  const path = [...state.history, state.current];
  const hero = HERO[state.hero];
  return `<div class="path">Герой: <b>${hero.name}</b> · Путь: <b>${path.join(" → ")}</b></div>`;
}

function bindStory(s){
  page.querySelectorAll(".choice").forEach(b=>{
    b.addEventListener("click",()=>{ Sound.firstGesture(); go(parseInt(b.dataset.to,10), true); });
    b.addEventListener("mouseenter",()=>{ /* subtle */ });
  });
  const backBtn=page.querySelector("#backBtn");
  if(backBtn){ backBtn.disabled = state.history.length===0;
    backBtn.addEventListener("click",()=>back()); }
  const home=page.querySelector("#homeBtn");
  if(home) home.addEventListener("click",()=>restart());
  const again=page.querySelector("#againBtn");
  if(again) again.addEventListener("click",()=>restart());
  const back2=page.querySelector("#backBtn2");
  if(back2){ back2.disabled = state.history.length===0;
    back2.addEventListener("click",()=>back()); }
  bindSound();
}

function bindSound(){
  const sb=page.querySelector("#soundBtn");
  if(sb) sb.addEventListener("click",()=>{ Sound.firstGesture(); const on=Sound.toggle();
    sb.textContent = on?'♪ звук':'✕ тихо'; });
}

function go(id, pushHistory){
  if(pushHistory && state.current!=null) state.history.push(state.current);
  state.current=id;
  Sound.pageTurn();
  renderStory(id);
  const s=STORY[id];
  if(s.sfx) setTimeout(()=>Sound.play(s.sfx), 360);
  window.scrollTo({top:0,behavior:"smooth"});
}

function back(){
  if(state.history.length===0) return;
  const prev = state.history.pop();
  state.current=prev;
  Sound.pageTurn();
  renderStory(prev);
  window.scrollTo({top:0,behavior:"smooth"});
}

function restart(){
  state={hero:null,current:null,history:[]};
  Sound.pageTurn();
  renderCover();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* start */
renderCover();
</script>
</body>
</html>
